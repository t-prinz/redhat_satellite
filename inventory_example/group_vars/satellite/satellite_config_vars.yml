---
satellite_organization: "Acme"
satellite_location: "Sonoran Desert"
satellite_manifest_path: your-manifest-file.zip
satellite_validate_certs: False

# This list defines the repositories that will be synchronized

satellite_products:
  - name: Red Hat Enterprise Linux for x86_64
    repository_sets:
      - name: Red Hat Enterprise Linux 9 for x86_64 - BaseOS (RPMs)
        releasever: 9
      - name: Red Hat Enterprise Linux 9 for x86_64 - AppStream (RPMs)
        releasever: 9
      - name: Red Hat Enterprise Linux 10 for x86_64 - BaseOS (RPMs)
        releasever: 10
      - name: Red Hat Enterprise Linux 10 for x86_64 - AppStream (RPMs)
        releasever: 10
      - name: Red Hat Satellite Tools 6.10 for RHEL 8 x86_64 (RPMs)
      - name: Red Hat Satellite Client 6 for RHEL 9 x86_64 (RPMs)
      - name: Red Hat Satellite Client 6 for RHEL 10 x86_64 (RPMs)

# This list defines the lifecycle environments that will be created

satellite_lifecycle_environments:
  - name: "Dev"
    description: "Development environment"
    prior: "Library"
  - name: "Test"
    description: "Test environment"
    prior: "Dev"
  - name: "Prod"
    description: "Production environment"
    prior: "Test"

# This list defines the Content Views that will created, along with the included repositories

satellite_content_views:
  - name: RHEL-9-Base-CV
    repositories:
      - name: Red Hat Enterprise Linux 9 for x86_64 - AppStream RPMs 9
        product: Red Hat Enterprise Linux for x86_64
      - name: Red Hat Enterprise Linux 9 for x86_64 - BaseOS RPMs 9
        product: Red Hat Enterprise Linux for x86_64
      - name: Red Hat Satellite Client 6 for RHEL 9 x86_64 RPMs 
        product: Red Hat Enterprise Linux for x86_64
      - name: JBoss Web Server 6 RHEL 9 RPMs
        product: JBoss Enterprise Web Server
  - name: RHEL-10-Base-CV
    repositories:
      - name: Red Hat Enterprise Linux 10 for x86_64 - AppStream RPMs 10
        product: Red Hat Enterprise Linux for x86_64
      - name: Red Hat Enterprise Linux 10 for x86_64 - BaseOS RPMs 10
        product: Red Hat Enterprise Linux for x86_64
      - name: Red Hat Satellite Client 6 for RHEL 10 x86_64 RPMs 
        product: Red Hat Enterprise Linux for x86_64
      - name: JBoss Web Server 6 RHEL 10 RPMs
        product: JBoss Enterprise Web Server

# This list defines the Content Views to publish; each Content View can have a list of filters applied
#
#   RHEL 9
#     The first does not have any filters applied
#     The second has 2 filters applied
#     The third also has 2 filters applied but the date of the Exclude filter is updated
#
#   RHEL 10
#     The first does not have any filters applied
#     The second has 2 filters applied
#     The third also has 2 filters applied but the date of the Exclude filter is updated

satellite_content_views_to_publish:
  - organization: "{{ satellite_organization }}"
    password: "{{ satellite_password }}"
    server_url: "{{ satellite_server_url }}"
    username: "{{ satellite_username }}"
    validate_certs: "{{ satellite_validate_certs }}"
    content_view: RHEL-9-Base-CV
    description: "Initial publish; unfiltered"
    lifecycle_environments:
      - Library
    state: present
    version: "1.0"
  - organization: "{{ satellite_organization }}"
    password: "{{ satellite_password }}"
    server_url: "{{ satellite_server_url }}"
    username: "{{ satellite_username }}"
    validate_certs: "{{ satellite_validate_certs }}"
    content_view: RHEL-9-Base-CV
    description: "2025-10 Update - all packages, errata excluded starting 2025-11-01"
    force_promote: True
    lifecycle_environments:
      - Library
      - Prod
    state: present
    version: "2.0"
    filters:
      - description: Specifies all packages
        filter_type: rpm
        inclusion: yes
        name: "All packages"
        original_packages: yes
        state: present
        rules:
          - architecture: "*"
            name: "*"
            rule_state: present
      - description: Exclude errata after a given date
        filter_type: erratum
        inclusion: no
        name: Errata-To-Date
        state: present
        rules:
          - date_type: updated
            name: "Exclude errata after 2025-11-01"
            rule_state: present
            start_date: "2025-11-01"
            types:
              - bugfix
              - enhancement
              - security
  - organization: "{{ satellite_organization }}"
    password: "{{ satellite_password }}"
    server_url: "{{ satellite_server_url }}"
    username: "{{ satellite_username }}"
    validate_certs: "{{ satellite_validate_certs }}"
    content_view: RHEL-9-Base-CV
    description: "2025-11 Update - all packages, errata excluded starting 2025-12-01"
    force_promote: True
    lifecycle_environments:
      - Library
      - Test
      - Dev
    state: present
    version: "3.0"
    filters:
      - description: Specifies all packages
        filter_type: rpm
        inclusion: yes
        name: "All packages"
        original_packages: yes
        state: present
        rules:
          - architecture: "*"
            name: "*"
            rule_state: present
      - description: Exclude errata after a given date
        filter_type: erratum
        inclusion: no
        name: Errata-To-Date
        state: present
        rules:
          - date_type: updated
            name: "Exclude errata after 2025-12-01"
            rule_state: present
            start_date: "2025-12-01"
            types:
              - bugfix
              - enhancement
              - security
  - organization: "{{ satellite_organization }}"
    password: "{{ satellite_password }}"
    server_url: "{{ satellite_server_url }}"
    username: "{{ satellite_username }}"
    validate_certs: "{{ satellite_validate_certs }}"
    content_view: RHEL-10-Base-CV
    description: "Initial publish; unfiltered"
    lifecycle_environments:
      - Library
    state: present
    version: "1.0"
  - organization: "{{ satellite_organization }}"
    password: "{{ satellite_password }}"
    server_url: "{{ satellite_server_url }}"
    username: "{{ satellite_username }}"
    validate_certs: "{{ satellite_validate_certs }}"
    content_view: RHEL-10-Base-CV
    description: "2025-10 Update - all packages, errata excluded starting 2025-11-01"
    force_promote: True
    lifecycle_environments:
      - Library
      - Prod
    state: present
    version: "2.0"
    filters:
      - description: Specifies all packages
        filter_type: rpm
        inclusion: yes
        name: "All packages"
        original_packages: yes
        state: present
        rules:
          - architecture: "*"
            name: "*"
            rule_state: present
      - description: Exclude errata after a given date
        filter_type: erratum
        inclusion: no
        name: Errata-To-Date
        state: present
        rules:
          - date_type: updated
            name: "Exclude errata after 2025-11-01"
            rule_state: present
            start_date: "2025-11-01"
            types:
              - bugfix
              - enhancement
              - security
  - organization: "{{ satellite_organization }}"
    password: "{{ satellite_password }}"
    server_url: "{{ satellite_server_url }}"
    username: "{{ satellite_username }}"
    validate_certs: "{{ satellite_validate_certs }}"
    content_view: RHEL-10-Base-CV
    description: "2025-11 Update - all packages, errata excluded starting 2025-12-01"
    force_promote: True
    lifecycle_environments:
      - Library
      - Test
      - Dev
    state: present
    version: "3.0"
    filters:
      - description: Specifies all packages
        filter_type: rpm
        inclusion: yes
        name: "All packages"
        original_packages: yes
        state: present
        rules:
          - architecture: "*"
            name: "*"
            rule_state: present
      - description: Exclude errata after a given date
        filter_type: erratum
        inclusion: no
        name: Errata-To-Date
        state: present
        rules:
          - date_type: updated
            name: "Exclude errata after 2025-12-01"
            rule_state: present
            start_date: "2025-12-01"
            types:
              - bugfix
              - enhancement
