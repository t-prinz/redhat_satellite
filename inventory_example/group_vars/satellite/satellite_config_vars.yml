# This list defines the Host Collections

satellite_host_collections:
  - name: "RHEL-Dev-HC"
  - name: "RHEL-Test-HC"
  - name: "RHEL-Prod-HC"

# This list defines the Activation Keys 

satellite_activation_keys:
  - name: "RHEL-9-Dev-AK"
    lifecycle_environment: "Dev"
    content_view: "RHEL-9-Base-CV"
    content_overrides:
      - label: "satellite-client-6-for-rhel-9-x86_64-rpms"
        override: enabled
    host_collections:
      - "RHEL-Dev-HC"
    purpose_role: "Red Hat Enterprise Linux Server"
    purpose_usage: Production
    service_level: Standard
  - name: "RHEL-9-Test-AK"
    lifecycle_environment: "Test"
    content_view: "RHEL-9-Base-CV"
    content_overrides:
      - label: "satellite-client-6-for-rhel-9-x86_64-rpms"
        override: enabled
    host_collections:
      - "RHEL-Test-HC"
    purpose_role: "Red Hat Enterprise Linux Server"
    purpose_usage: Production
    service_level: Standard
  - name: "RHEL-9-Prod-AK"
    lifecycle_environment: "Prod"
    content_view: "RHEL-9-Base-CV"
    content_overrides:
      - label: "satellite-client-6-for-rhel-9-x86_64-rpms"
        override: enabled
    host_collections:
      - "RHEL-Prod-HC"
    purpose_role: "Red Hat Enterprise Linux Server"
    purpose_usage: Production
    service_level: Standard
  - name: "RHEL-10-Dev-AK"
    lifecycle_environment: "Dev"
    content_view: "RHEL-10-Base-CV"
    content_overrides:
      - label: "satellite-client-6-for-rhel-10-x86_64-rpms"
        override: enabled
    host_collections:
      - "RHEL-Dev-HC"
    purpose_role: "Red Hat Enterprise Linux Server"
    purpose_usage: Production
    service_level: Standard
  - name: "RHEL-10-Test-AK"
    lifecycle_environment: "Test"
    content_view: "RHEL-10-Base-CV"
    content_overrides:
      - label: "satellite-client-6-for-rhel-10-x86_64-rpms"
        override: enabled
    host_collections:
      - "RHEL-Test-HC"
    purpose_role: "Red Hat Enterprise Linux Server"
    purpose_usage: Production
    service_level: Standard
  - name: "RHEL-10-Prod-AK"
    lifecycle_environment: "Prod"
    content_view: "RHEL-10-Base-CV"
    content_overrides:
      - label: "satellite-client-6-for-rhel-10-x86_64-rpms"
        override: enabled
    host_collections:
      - "RHEL-Prod-HC"
    purpose_role: "Red Hat Enterprise Linux Server"
    purpose_usage: Production
    service_level: Standard

# This list defines the Host Groups

satellite_hostgroups:
  - activation_keys: "RHEL-9-Dev-AK"
    content_view: "RHEL-9-Base-CV"
    lifecycle_environment: "Dev"
    name: "RHEL-9-Dev-HG"
  - activation_keys: "RHEL-9-Test-AK"
    content_view: "RHEL-9-Base-CV"
    lifecycle_environment: "Test"
    name: "RHEL-9-Test-HG"
  - activation_keys: "RHEL-9-Prod-AK"
    content_view: "RHEL-9-Base-CV"
    lifecycle_environment: "Prod"
    name: "RHEL-9-Prod-HG"
  - activation_keys: "RHEL-10-Dev-AK"
    content_view: "RHEL-10-Base-CV"
    lifecycle_environment: "Dev"
    name: "RHEL-10-Dev-HG"
  - activation_keys: "RHEL-10-Test-AK"
    content_view: "RHEL-10-Base-CV"
    lifecycle_environment: "Test"
    name: "RHEL-10-Test-HG"
  - activation_keys: "RHEL-10-Prod-AK"
    content_view: "RHEL-10-Base-CV"
    lifecycle_environment: "Prod"
